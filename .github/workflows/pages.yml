name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          GITHUB_PAGES: "true"
          VITE_FIREBASE_API_KEY: "AIzaSyC32incQCNZAQ52hxCGa4mzRCpfIuoAsKI"
          VITE_FIREBASE_AUTH_DOMAIN: "the-pizza-scale.firebaseapp.com"
          VITE_FIREBASE_PROJECT_ID: "the-pizza-scale"
          VITE_FIREBASE_STORAGE_BUCKET: "the-pizza-scale.firebasestorage.app"
          VITE_FIREBASE_MESSAGING_SENDER_ID: "805928480114"
          VITE_FIREBASE_APP_ID: "1:805928480114:web:757451897522cf1def01eb"
          VITE_FIREBASE_MEASUREMENT_ID: "G-DTER8KTXMF"
          VITE_OMDB_API_KEY: "c24b1a88"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
